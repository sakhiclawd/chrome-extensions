<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Mode</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; width: 250px; padding: 20px; background-color: #f9f9f9; text-align: center; }
    h1 { font-size: 1.2rem; color: #333; margin-bottom: 10px; }
    #timer-display { font-size: 2rem; font-weight: bold; color: #2ecc71; margin: 15px 0; }
    .btn { padding: 10px 20px; font-size: 1rem; border: none; border-radius: 5px; cursor: pointer; color: white; transition: background-color 0.3s; width: 100%; }
    #start-btn { background-color: #2ecc71; }
    #start-btn:hover { background-color: #27ae60; }
    #stop-btn { background-color: #e74c3c; margin-top: 10px; display: none; }
    #stop-btn:hover { background-color: #c0392b; }
    .stats { font-size: 0.8rem; color: #7f8c8d; margin-top: 15px; }
  </style>
</head>
<body>
  <h1>Focus Mode</h1>
  <div id="timer-display">25:00</div>
  <button id="start-btn" class="btn">Start Focus</button>
  <button id="stop-btn" class="btn">Stop Session</button>
  <div class="stats">Rules enabled: <span id="rules-count">3</span></div>
  <script src="popup.js"></script>
</body>
</html>
