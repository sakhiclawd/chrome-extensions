<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }
    #loading {
      text-align: center;
      display: none;
      padding: 30px 10px;
      font-size: 14px;
      color: #666;
    }
    #content {
      display: block;
    }
    .summary-box {
      background: #f8fafc;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      line-height: 1.6;
      font-size: 14px;
      color: #334155;
      max-height: 350px;
      overflow-y: auto;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      font-size: 11px;
      color: #94a3b8;
    }
    .status-link a {
      color: #007AFF;
      text-decoration: none;
    }
    .status-link a:hover {
      text-decoration: underline;
    }
    .btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 12px 15px;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .btn:hover {
      background: #005ecb;
    }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover {
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">AI Webpage Summary 🌸</div>
  </div>

  <div id="loading">
    Analyzing content...
  </div>

  <div id="content">
    <div id="summary" class="summary-box">
      Click below to generate an AI summary and save it to the PM Directory library.
    </div>
    <div class="meta">
      <span id="readingTime"></span>
      <span id="statusLink" class="status-link"></span>
    </div>
    <button id="summarizeBtn" class="btn">Summarize & Save</button>
    <button id="shareBtn" class="btn btn-secondary" style="display:none;">Copy Library Link</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
